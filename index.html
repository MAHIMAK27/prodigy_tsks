<!DOCTYPE html>
<html>
<head>
    <title>Temperature Converter</title>
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00c853;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00e676;
        }

        .result {
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🌡️ Temperature Converter</h2>

    <input type="number" id="temp" placeholder="Enter temperature">

    <select id="unit">
        <option value="C">Celsius (°C)</option>
        <option value="F">Fahrenheit (°F)</option>
        <option value="K">Kelvin (K)</option>
    </select>

    <button onclick="convert()">Convert</button>

    <div class="result" id="output"></div>
</div>

<script>
function convert() {
    let temp = parseFloat(document.getElementById("temp").value);
    let unit = document.getElementById("unit").value;
    let output = "";

    if (isNaN(temp)) {
        document.getElementById("output").innerHTML = "❌ Enter a valid number";
        return;
    }

    if (unit === "C") {
        output = `
        Celsius: ${temp} °C <br>
        Fahrenheit: ${(temp * 9/5 + 32).toFixed(2)} °F <br>
        Kelvin: ${(temp + 273.15).toFixed(2)} K
        `;
    } else if (unit === "F") {
        let c = (temp - 32) * 5/9;
        output = `
        Fahrenheit: ${temp} °F <br>
        Celsius: ${c.toFixed(2)} °C <br>
        Kelvin: ${(c + 273.15).toFixed(2)} K
        `;
    } else {
        let c = temp - 273.15;
        output = `
        Kelvin: ${temp} K <br>
        Celsius: ${c.toFixed(2)} °C <br>
        Fahrenheit: ${(c * 9/5 + 32).toFixed(2)} °F
        `;
    }

    document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
